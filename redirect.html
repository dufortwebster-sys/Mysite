<!DOCTYPE html>
<html lang="fr">
<head>
<script data-goatcounter="https://dufortfyatu.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
    overflow:hidden;
}

.container{
    width:340px;
    padding:40px 30px;
    border-radius:25px;
    text-align:center;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    backdrop-filter:blur(14px);
    box-shadow:0 10px 40px rgba(0,0,0,0.35);
    animation:fadeIn 1s ease;
}

.timer-circle{
    width:120px;
    height:120px;
    margin:auto;
    border-radius:50%;
    border:4px solid rgba(255,255,255,0.2);
    display:flex;
    justify-content:center;
    align-items:center;
    animation:pulse 2s infinite;
}

.timer{
    font-size:42px;
    font-weight:600;
    color:white;
}

h1{
    color:white;
    margin-top:25px;
    font-size:28px;
}

p{
    color:rgba(255,255,255,0.8);
    margin-top:10px;
    font-size:15px;
}

.progress{
    width:100%;
    height:6px;
    background:rgba(255,255,255,0.1);
    border-radius:10px;
    overflow:hidden;
    margin-top:30px;
}

.progress span{
    display:block;
    height:100%;
    width:0%;
    background:white;
    animation:loading 5s linear forwards;
}

@keyframes loading{
    to{
        width:100%;
    }
}

@keyframes pulse{
    0%{
        box-shadow:0 0 0 0 rgba(255,255,255,0.2);
    }
    70%{
        box-shadow:0 0 0 25px rgba(255,255,255,0);
    }
    100%{
        box-shadow:0 0 0 0 rgba(255,255,255,0);
    }
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="timer-circle">
        <div class="timer" id="count">5</div>
    </div>

    <h1>Confirmation</h1>
    <p>Redirection en cours...</p>

    <div class="progress">
        <span></span>
    </div>

</div>

<script>
let timeLeft = 5;
const count = document.getElementById("count");

const timer = setInterval(() => {

    timeLeft--;
    count.textContent = timeLeft;

    if(timeLeft <= 0){

        clearInterval(timer);

        // Redirection dans le même onglet
        window.location.replace("https://clicknlook.site/a/qx829t7E96FNXAO");

    }

}, 1000);
</script>

</body>
</html>
