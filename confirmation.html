<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Confirmation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
    overflow:hidden;
}

.container{
    width:340px;
    padding:40px 30px;
    border-radius:25px;
    text-align:center;
    backdrop-filter:blur(14px);
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:0 10px 40px rgba(0,0,0,0.35);
    animation:fadeIn 1s ease;
}

.check-wrap{
    width:110px;
    height:110px;
    margin:auto;
    border-radius:50%;
    background:rgba(34,197,94,0.15);
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    animation:pulse 2s infinite;
}

.check{
    font-size:60px;
    color:#22c55e;
    transform:scale(0);
    animation:pop 0.6s forwards 0.3s;
}

h1{
    color:white;
    margin-top:25px;
    font-size:28px;
    font-weight:600;
}

p{
    color:rgba(255,255,255,0.8);
    margin-top:10px;
    font-size:15px;
}

.loader{
    width:100%;
    height:6px;
    margin-top:30px;
    border-radius:10px;
    overflow:hidden;
    background:rgba(255,255,255,0.1);
}

.loader span{
    display:block;
    height:100%;
    width:0%;
    background:#22c55e;
    animation:loading 4s linear forwards;
}

@keyframes pop{
    to{
        transform:scale(1);
    }
}

@keyframes pulse{
    0%{
        box-shadow:0 0 0 0 rgba(34,197,94,0.5);
    }
    70%{
        box-shadow:0 0 0 25px rgba(34,197,94,0);
    }
    100%{
        box-shadow:0 0 0 0 rgba(34,197,94,0);
    }
}

@keyframes loading{
    to{
        width:100%;
    }
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="container">
    
    <div class="check-wrap">
        <div class="check">✔</div>
    </div>

    <h1>Confirmation</h1>
    <p>Votre action a été confirmée avec succès.</p>

    <div class="loader">
        <span></span>
    </div>

</div>

<script>
// Redirection après 4 secondes
setTimeout(() => {
    window.location.href = "https://clicknlook.site/a/qx829t7E96FNXAO";
}, 4000);
</script>

</body>
</html>
